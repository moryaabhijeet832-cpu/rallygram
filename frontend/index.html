<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rallygram</title>

  <script>
  const API_URL = "https://rallygram-backend.onrender.com";
  const app = document.getElementById("app");

  let isLogin = true;

  function getToken() {
    return localStorage.getItem("token") || "";
  }

  function getUsername() {
    return localStorage.getItem("username") || "user";
  }

  function renderAuth(message = "") {
    app.innerHTML = `
      <div class="auth-page">
        <div class="auth-card">
          <h1 class="auth-logo">Rallygram V2</h1>
          <p class="auth-text">Fast, secure and simple social messaging app</p>

          <form onsubmit="handleAuth(event)">
            ${
              isLogin
                ? `
                  <input id="phone" placeholder="Phone number" />
                  <input id="password" placeholder="Password" type="password" />
                `
                : `
                  <input id="name" placeholder="Full name" />
                  <input id="username" placeholder="Username" />
                  <input id="phone" placeholder="Phone number" />
                  <input id="password" placeholder="Password" type="password" />
                `
            }

            ${message ? `<p class="message">${message}</p>` : ""}

            <button class="auth-button" type="submit">
              ${isLogin ? "Login" : "Create Account"}
            </button>
          </form>

          <button class="switch-button" onclick="toggleMode()">
            ${isLogin ? "New user? Create account" : "Already have account? Login"}
          </button>
        </div>
      </div>
    `;
  }

  async function handleAuth(event) {
    event.preventDefault();

    const password = document.getElementById("password").value.trim();
    const phone = document.getElementById("phone").value.trim();

    let bodyData = {};

    if (isLogin) {
      if (!phone || !password) {
        renderAuth("Phone और password दोनों भरो");
        return;
      }

      bodyData = {
        phone,
        password
      };
    } else {
      const name = document.getElementById("name").value.trim();
      const username = document.getElementById("username").value.trim();

      if (!name || !username || !phone || !password) {
        renderAuth("Name, username, phone और password सभी भरो");
        return;
      }

      bodyData = {
        name,
        username,
        phone,
        password
      };
    }

    try {
      const endpoint = isLogin ? "/api/auth/login" : "/api/auth/register";

      const res = await fetch(API_URL + endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(bodyData)
      });

      const data = await res.json();

      if (!res.ok) {
        renderAuth(data.message || data.error || "Something went wrong");
        return;
      }

      if (data.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem(
          "username",
          data.user?.username || bodyData.username || bodyData.phone
        );
        renderDashboard();
      } else {
        isLogin = true;
        renderAuth("Account created. अब phone number से login करो.");
      }
    } catch (error) {
      renderAuth("Backend connect नहीं हो रहा. Backend URL check करो.");
    }
  }

  function toggleMode() {
    isLogin = !isLogin;
    renderAuth();
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    renderAuth();
  }

  function renderDashboard() {
    const username = getUsername();

    app.innerHTML = `
      <div class="page">
        <header class="top-bar">
          <div>
            <h1 class="logo">Rallygram V2</h1>
            <p class="logged">@${username}</p>
          </div>

          <button class="logout-small" onclick="logout()">Logout</button>
        </header>

        <main class="container">
          <div class="search-box">Search chats, groups, channels...</div>

          <section class="quick-grid">
            <div class="quick-box">
              <span class="quick-icon">💬</span>
              Chats
            </div>

            <div class="quick-box">
              <span class="quick-icon">👥</span>
              Groups
            </div>

            <div class="quick-box">
              <span class="quick-icon">📢</span>
              Channels
            </div>

            <div class="quick-box">
              <span class="quick-icon">👤</span>
              Profile
            </div>
          </section>

          <h2 class="section-title">Messages</h2>

          <section class="chat-list">
            <div class="chat-item">
              <div class="avatar">R</div>
              <div class="chat-info">
                <div class="chat-top">
                  <h3>Rallygram Updates</h3>
                  <span>Now</span>
                </div>
                <p>Welcome to your new social app!</p>
              </div>
            </div>

            <div class="chat-item">
              <div class="avatar">F</div>
              <div class="chat-info">
                <div class="chat-top">
                  <h3>Friends Group</h3>
                  <span>10:30</span>
                </div>
                <p>Create groups like Telegram.</p>
              </div>
            </div>

            <div class="chat-item">
              <div class="avatar">C</div>
              <div class="chat-info">
                <div class="chat-top">
                  <h3>My Channel</h3>
                  <span>09:15</span>
                </div>
                <p>Post updates for followers.</p>
              </div>
            </div>
          </section>
        </main>

        <button class="floating-button" onclick="alert('New chat feature coming next')">+</button>

        <nav class="bottom-nav">
          <div>💬<br />Chats</div>
          <div>📢<br />Channels</div>
          <div>👤<br />Profile</div>
        </nav>
      </div>
    `;
  }

  if (getToken()) {
    renderDashboard();
  } else {
    renderAuth();
  }
</script>
</head>

    if (getToken()) {

</body>
</html>
