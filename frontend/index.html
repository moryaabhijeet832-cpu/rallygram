<body>
  <div id="app"></div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    var API_URL = "https://rallygram-backend-2.onrender.com";
    var app = document.getElementById("app");
    var isLogin = true;
var socket = window.io
  ? io(API_URL, {
      transports: ["websocket", "polling"]
    })
  : {
      on: function() {},
      emit: function() {}
    };
var currentChatName = "";
    var currentChatTitle = "";

function safeText(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
function formatMessageTime(value) {
  if (!value) {
    return "";
  }

  var text = String(value);

  if (text.includes(":") && !text.includes("T")) {
    return text.split(":").slice(0, 2).join(":");
  }

  try {
    var date = new Date(value);

    if (!isNaN(date.getTime())) {
      return date.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    return text;
  } catch (error) {
    return text;
  }
}
socket.on("receive_message", function(data) {
  var messages = document.getElementById("chatMessages");

  if (!messages || !currentChatName) {
    return;
  }

  if (data.chat !== currentChatName) {
    return;
  }

  var myUsername = localStorage.getItem("username") || "user";
  var messageClass = data.sender === myUsername ? "my-message" : "other-message";

  messages.innerHTML +=
  '<div class="' + messageClass + '">' +
    safeText(data.text) +
    '<div class="message-time">' + safeText(formatMessageTime(data.time || data.createdAt)) + '</div>' +
  '</div>';
  messages.scrollTop = messages.scrollHeight;
});
 socket.on("old_messages", function(messages) {
  var messagesBox = document.getElementById("chatMessages");

  if (!messagesBox) {
    return;
  }

  var titleEl = document.querySelector(".chat-title");
  var welcomeName = titleEl ? titleEl.innerText : currentChatName;

  messagesBox.innerHTML =
    '<div class="other-message">Welcome to ' + safeText(welcomeName) + '</div>';

  var myUsername = localStorage.getItem("username") || "user";

  messages.forEach(function(msg) {
    var messageClass = msg.sender === myUsername ? "my-message" : "other-message";

    messagesBox.innerHTML +=
      '<div class="' + messageClass + '">' +
        safeText(msg.text) +
        '<div class="message-time">' + safeText(formatMessageTime(msg.time || msg.createdAt)) + '</div>' +
      '</div>';
  });

  messagesBox.scrollTop = messagesBox.scrollHeight;
});
    function renderAuth(message) {
      if (!message) message = "";

      if (isLogin) {
        app.innerHTML =
          '<div class="auth-page">' +
            '<div class="auth-card">' +
              '<h1 class="auth-logo">Rallygram V3</h1>' +
              '<p class="auth-text">Login with phone number and password</p>' +

              '<form onsubmit="handleAuth(event)">' +
                '<input id="phone" placeholder="Phone number" />' +
                '<input id="password" placeholder="Password" type="password" />' +
                (message ? '<p class="message">' + message + '</p>' : '') +
                '<button class="auth-button" type="submit">Login</button>' +
              '</form>' +

              '<button class="switch-button" onclick="toggleMode()">New user? Create account</button>' +
            '</div>' +
          '</div>';
      } else {
        app.innerHTML =
          '<div class="auth-page">' +
            '<div class="auth-card">' +
              '<h1 class="auth-logo">Rallygram V3</h1>' +
              '<p class="auth-text">Create your Rallygram account</p>' +

              '<form onsubmit="handleAuth(event)">' +
                '<input id="name" placeholder="Full name" />' +
                '<input id="username" placeholder="Username" />' +
                '<input id="phone" placeholder="Phone number" />' +
                '<input id="password" placeholder="Password" type="password" />' +
                (message ? '<p class="message">' + message + '</p>' : '') +
                '<button class="auth-button" type="submit">Create Account</button>' +
              '</form>' +

              '<button class="switch-button" onclick="toggleMode()">Already have account? Login</button>' +
            '</div>' +
          '</div>';
      }
    }

    async function handleAuth(event) {
      event.preventDefault();

      var phone = document.getElementById("phone").value.trim();
      var password = document.getElementById("password").value.trim();

      var bodyData = {};

      if (isLogin) {
        if (!phone || !password) {
          renderAuth("Phone और password दोनों भरो");
          return;
        }

        bodyData = {
          phone: phone,
          password: password
        };
      } else {
        var name = document.getElementById("name").value.trim();
        var username = document.getElementById("username").value.trim();

        if (!name || !username || !phone || !password) {
          renderAuth("Name, username, phone और password सभी भरो");
          return;
        }

        bodyData = {
          name: name,
          username: username,
          phone: phone,
          password: password
        };
      }

      try {
        var endpoint = isLogin ? "/api/auth/login" : "/api/auth/register";

        var response = await fetch(API_URL + endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(bodyData)
        });

        var data = await response.json();

        if (!response.ok) {
          renderAuth(data.message || data.error || "Something went wrong");
          return;
        }

        if (data.token) {
          localStorage.setItem("token", data.token);

          if (data.user && data.user.username) {
            localStorage.setItem("username", data.user.username);
          } else if (bodyData.username) {
            localStorage.setItem("username", bodyData.username);
          } else {
            localStorage.setItem("username", bodyData.phone);
          }


          localStorage.setItem("phone", bodyData.phone || "");

if (data.user && data.user.name) {
  localStorage.setItem("name", data.user.name);
} else if (bodyData.name) {
  localStorage.setItem("name", bodyData.name);
}
          renderDashboard();
        } else {
          isLogin = true;
          renderAuth("Account created. अब phone number से login करो.");
        }
      } catch (error) {
        renderAuth("Backend connect नहीं हो रहा. Backend URL check करो.");
      }
    }

    function toggleMode() {
      isLogin = !isLogin;
      renderAuth("");
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      localStorage.removeItem("name");
localStorage.removeItem("phone");
      renderAuth("");
    }

   function openChat(chatName, avatar, titleText) {
  window.scrollTo(0, 0);
  currentChatName = chatName;

  var displayTitle = titleText || chatName;
  currentChatTitle = displayTitle;

  app.innerHTML =
    '<div class="chat-page">' +
      '<header class="chat-header">' +
        '<button class="back-btn" onclick="renderDashboard()">←</button>' +
        '<div class="avatar">' + safeText(avatar) + '</div>' +
        '<h1 class="chat-title">' + safeText(displayTitle) + '</h1>' +
      '</header>' +

      '<div id="chatMessages" class="messages-area">' +
        '<div class="other-message">Welcome to ' + safeText(displayTitle) + '</div>' +
      '</div>' +

      '<div class="message-box">' +
        '<input id="messageInput" class="message-input" placeholder="Type a message..." />' +
        '<button class="send-btn" onclick="sendDemoMessage()">Send</button>' +
      '</div>' +
    '</div>';

  socket.emit("join_chat", chatName);
}

function sendDemoMessage() {
  var input = document.getElementById("messageInput");

  if (!input || !input.value.trim()) {
    return;
  }

  var myUsername = localStorage.getItem("username") || "user";

  socket.emit("send_message", {
    chat: currentChatName,
    text: input.value.trim(),
    sender: myUsername,
    time: new Date().toLocaleTimeString()
  });

  input.value = "";
}
function makePrivateRoom(myUsername, otherUsername) {
  var users = [String(myUsername), String(otherUsername)].sort();
  return "private:" + users[0] + ":" + users[1];
}

var allUsersData = [];

function renderUsersList(searchText) {
  var usersList = document.getElementById("usersList");

  if (!usersList) {
    return;
  }

  var myUsername = localStorage.getItem("username") || "user";
  var keyword = String(searchText || "").toLowerCase();

  var users = allUsersData.filter(function(user) {
    if (user.username === myUsername) {
      return false;
    }

    var username = String(user.username || "").toLowerCase();
    var name = String(user.name || "").toLowerCase();
    var phone = String(user.phone || "").toLowerCase();

    return (
      username.includes(keyword) ||
      name.includes(keyword) ||
      phone.includes(keyword)
    );
  });

  if (users.length === 0) {
    usersList.innerHTML = '<div class="chat-item">No users found</div>';
    return;
  }

  usersList.innerHTML = "";

  users.forEach(function(user) {
    var firstLetter = user.username ? user.username.charAt(0).toUpperCase() : "U";
    var roomName = makePrivateRoom(myUsername, user.username);

    usersList.innerHTML +=
      '<div class="chat-item" onclick="openChat(\'' + roomName + '\', \'' + firstLetter + '\', \'@' + user.username + '\')">' +
        '<div class="avatar">' + firstLetter + '</div>' +
        '<div class="chat-info">' +
          '<div class="chat-top">' +
            '<h3>@' + safeText(user.username) + '</h3>' +
            '<span>Online</span>' +
          '</div>' +
          '<p>' + safeText(user.name || "Rallygram user") + '</p>' +
        '</div>' +
      '</div>';
  });
}

function filterUsers() {
  var input = document.getElementById("userSearchInput");

  if (!input) {
    return;
  }

  renderUsersList(input.value);
}

async function loadUsers() {
  var usersList = document.getElementById("usersList");

  if (!usersList) {
    return;
  }

  usersList.innerHTML = '<div class="chat-item">Loading users...</div>';

  try {
    var response = await fetch(API_URL + "/api/auth/users");
    var data = await response.json();

    if (!data.success) {
      usersList.innerHTML = '<div class="chat-item">Users load failed</div>';
      return;
    }

    allUsersData = data.users || [];

    

    renderUsersList("");
  } catch (error) {
    usersList.innerHTML = '<div class="chat-item">Backend connect failed</div>';
  }
}
async function loadRecentChats() {
  var recentList = document.getElementById("recentChatsList");

  if (!recentList) {
    return;
  }

  var myUsername = localStorage.getItem("username") || "user";

  recentList.innerHTML = '<div class="chat-item">Loading recent chats...</div>';

  try {
    var response = await fetch(API_URL + "/api/messages/recent/" + myUsername);
    var data = await response.json();

    if (!data.success || !data.chats || data.chats.length === 0) {
      recentList.innerHTML = '<div class="chat-item">No recent chats yet</div>';
      return;
    }

    recentList.innerHTML = "";

    data.chats.forEach(function(chat) {
      var roomName = chat._id;
      var parts = roomName.split(":");

      var otherUsername = "user";

      if (parts.length === 3) {
        otherUsername = parts[1] === myUsername ? parts[2] : parts[1];
      }

      var firstLetter = otherUsername.charAt(0).toUpperCase();
      var lastMessage = chat.lastMessage || "No message";

      recentList.innerHTML +=
        '<div class="chat-item" onclick="openChat(\'' + roomName + '\', \'' + firstLetter + '\', \'@' + otherUsername + '\')">' +
          '<div class="avatar">' + firstLetter + '</div>' +
          '<div class="chat-info">' +
            '<div class="chat-top">' +
              '<h3>@' + safeText(otherUsername) + '</h3>' +
              '<span>' + safeText(formatMessageTime(chat.time || chat.createdAt)) + '</span>' +
            '</div>' +
            '<p>' + safeText(lastMessage) + '</p>' +
          '</div>' +
        '</div>';
    });
  } catch (error) {
    recentList.innerHTML = '<div class="chat-item">Recent chats load failed</div>';
  }
}

var bio = localStorage.getItem("bio") || "";

        return user.username === username;
      });

      if (currentUser) {
        name = currentUser.name || name;
phone = currentUser.phone || phone;
bio = currentUser.bio || bio;

localStorage.setItem("name", name);

          '<div class="profile-row">' +
            '<div class="profile-label">Username</div>' +
            '<div class="profile-value">@' + safeText(username) + '</div>' +
          '</div>' +

          '<div class="profile-row">' +
            '<div class="profile-label">Phone</div>' +
            '<div class="profile-value">' + safeText(phone) + '</div>' +
          '</div>' +

    '<div class="profile-row">' +
  '<div class="profile-label">Bio</div>' +
  '<div class="profile-value">' + safeText(bio || "No bio added") + '</div>' +
'</div>' +
    
          '<div class="profile-row">' +
            '<div class="profile-label">Account Status</div>' +
            '<div class="profile-value">Active</div>' +
          '</div>' +

          '<button class="profile-btn" onclick="renderDashboard()">Back to Dashboard</button>' +

function renderDashboard() {
  window.scrollTo(0, 0);
